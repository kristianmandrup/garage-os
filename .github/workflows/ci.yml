name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx turbo run build --filter=@garageos/ui
      - name: Type check UI
        run: npx tsc --noEmit -p packages/ui/tsconfig.json
      - name: Type check App
        run: npx tsc --noEmit -p packages/app/tsconfig.json
      - name: Type check Site
        run: npx tsc --noEmit -p packages/site/tsconfig.json

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx turbo run build --filter=@garageos/ui
      - name: Run UI tests
        run: cd packages/ui && npx vitest run
      - name: Run App tests
        run: cd packages/app && npx vitest run
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build Site
        run: npx turbo run build --filter=@garageos/site
      - name: Build App
        run: npx turbo run build --filter=@garageos/app
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

  e2e:
    name: E2E Tests (Site)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx turbo run build --filter=@garageos/ui
      - run: npx playwright install chromium
      - name: Run site E2E tests
        run: cd packages/site && npx playwright test
